<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مرکز بازی‌ها | فلاپی برد + نینجا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tahoma', 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }

        .card-title {
            font-size: 28px;
            color: white;
            margin-bottom: 20px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .game-card {
            background: rgba(255,255,255,0.15);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.25);
        }

        .game-icon {
            font-size: 70px;
            margin-bottom: 15px;
        }

        .game-card h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .game-card p {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            text-align: center;
        }

        .stat .value {
            font-size: 24px;
            font-weight: bold;
        }

        .stat .label {
            font-size: 11px;
            opacity: 0.8;
        }

        .btn-reset {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-title">🎮 مرکز بازی‌ها</div>
        <div class="games-grid">
            <div class="game-card" onclick="startFlappy()">
                <div class="game-icon">🐦</div>
                <h3>فلاپی برد</h3>
                <p>تک نفره | چند نفره آفلاین | فروشگاه</p>
            </div>
            <div class="game-card" onclick="startNinja()">
                <div class="game-icon">🥷</div>
                <h3>نینجا</h3>
                <p>بازی پلتفرمر | ماجراجویی | 20 مرحله</p>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📊 آمار من</div>
        <div class="stats">
            <div class="stat">
                <div class="value" id="flappyHighScore">0</div>
                <div class="label">فلاپی برد (بهترین)</div>
            </div>
            <div class="stat">
                <div class="value" id="flappyCoins">0</div>
                <div class="label">سکه فلاپی برد</div>
            </div>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="value" id="ninjaHighScore">0</div>
                <div class="label">نینجا (بهترین امتیاز)</div>
            </div>
            <div class="stat">
                <div class="value" id="ninjaCoins">0</div>
                <div class="label">سکه نینجا</div>
            </div>
        </div>
        <button class="btn-reset" onclick="resetAllData()">🗑️ ریست تمام داده‌ها</button>
    </div>
</div>

<script>
    // ==================== آمار ====================
    function loadStats() {
        // فلاپی برد
        let flappyHighScore = localStorage.getItem('flappy_local_highscore') || 0;
        let flappyCoins = localStorage.getItem('flappy_coins') || 0;
        document.getElementById('flappyHighScore').innerHTML = flappyHighScore;
        document.getElementById('flappyCoins').innerHTML = flappyCoins;
        
        // نینجا
        let ninjaHighScore = localStorage.getItem('ninja_total_score') || 0;
        let ninjaCoins = localStorage.getItem('ninja_coins') || 0;
        document.getElementById('ninjaHighScore').innerHTML = ninjaHighScore;
        document.getElementById('ninjaCoins').innerHTML = ninjaCoins;
    }
    
    function resetAllData() {
        if (confirm('آیا از حذف تمام داده‌های بازی مطمئن هستید؟ این کار قابل بازگشت نیست!')) {
            localStorage.clear();
            loadStats();
            alert('✅ تمام داده‌ها حذف شدند!');
        }
    }
    
    function startFlappy() {
        window.location.href = 'flappy.html';
    }
    
    function startNinja() {
        window.location.href = 'ninja.html';
    }
    
    loadStats();
</script>

</body>
</html>
